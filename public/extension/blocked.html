<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trang bị chặn – OptiMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #ede9fe 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      color: #1e1b4b; overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(600px 600px at 20% 10%, rgba(99,102,241,0.08) 0%, transparent 100%),
        radial-gradient(400px 400px at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 100%);
      pointer-events: none;
    }

    .card {
      position: relative;
      text-align: center;
      max-width: 500px;
      width: calc(100% - 40px);
      padding: 48px 40px 40px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(99,102,241,0.12), 0 4px 16px rgba(0,0,0,0.06);
    }

    .shield {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px; color: #6366f1; font-weight: 600;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px; font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .message {
      color: #4b5563;
      font-size: 15px; line-height: 1.7;
      margin-bottom: 28px;
    }

    .quote-box {
      background: linear-gradient(135deg, rgba(99,102,241,0.07), rgba(139,92,246,0.07));
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .quote-text {
      font-style: italic;
      color: #4338ca;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 500;
    }

    .quote-author {
      margin-top: 8px;
      font-size: 12px;
      color: #6366f1;
      font-weight: 600;
      opacity: 0.7;
    }

    .brand {
      margin-top: 24px;
      font-size: 11px; color: #9ca3af;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡️</span>
    <div class="badge">
      <span>🔒</span>
      <span id="site-name">trang này</span>
    </div>
    <h1>Giữ vững sự tập trung!</h1>
    <p class="message">
      Bạn đã chặn trang này để bảo vệ phiên học.<br>
      Hãy tiếp tục — bạn đang làm rất tốt!
    </p>
    <div class="quote-box">
      <p class="quote-text" id="quote-text"></p>
      <p class="quote-author" id="quote-author"></p>
    </div>
    <p class="brand">⚡ OptiMind Blocker</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
