<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trang bị chặn – OptiMind</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      color: white; overflow: hidden;
    }

    /* subtle background stars */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%);
      pointer-events: none;
    }

    .card {
      position: relative;
      text-align: center;
      max-width: 480px;
      width: calc(100% - 40px);
      padding: 44px 36px 36px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .shield {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px; color: #a5b4fc; font-weight: 500;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px; font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .message {
      color: rgba(255,255,255,0.55);
      font-size: 15px; line-height: 1.7;
      margin-bottom: 24px;
    }

    .quote {
      font-style: italic;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      border-left: 2px solid rgba(99,102,241,0.5);
      padding: 8px 14px;
      text-align: left;
      margin-bottom: 28px;
      border-radius: 0 6px 6px 0;
      background: rgba(99,102,241,0.05);
    }

    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 12px;
      padding: 12px 28px; color: white;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: 0.2s;
      box-shadow: 0 4px 15px rgba(99,102,241,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.45);
    }

    .brand {
      margin-top: 24px;
      font-size: 11px; color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡️</span>
    <div class="badge">
      <span>🔒</span>
      <span id="site-name">trang này</span>
    </div>
    <h1>Giữ vững sự tập trung!</h1>
    <p class="message">
      Bạn đã chặn trang này để bảo vệ phiên học.<br>
      Hãy tiếp tục — bạn đang làm rất tốt!
    </p>
    <blockquote class="quote">
      "Sự tập trung không phải là thứ bạn có, mà là thứ bạn luyện tập mỗi ngày."
    </blockquote>
    <div class="actions">
      <button class="btn-primary" id="close-btn">✕ Đóng tab</button>
    </div>
    <p class="brand">⚡ OptiMind Blocker</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const site = params.get('site') || '';
    if (site) document.getElementById('site-name').textContent = site;

    document.getElementById('close-btn').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
