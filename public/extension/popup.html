<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>OptiMind – Chặn Web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: #0f0f1a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo-text {
      font-size: 14px; font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Toggle ── */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 11px; color: rgba(255,255,255,0.5); }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 20px; transition: 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider::before { transform: translateX(16px); }

    /* ── Content ── */
    .content { padding: 14px 16px; }

    .input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .input-field {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 13px;
      outline: none; transition: 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.3); }
    .input-field:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.1);
    }
    .add-btn {
      background: #6366f1; border: none; border-radius: 8px;
      padding: 8px 14px; color: white;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: 0.2s; white-space: nowrap;
    }
    .add-btn:hover { background: #4f46e5; }

    .section-label {
      font-size: 11px; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .site-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 220px; overflow-y: auto;
    }
    .site-list::-webkit-scrollbar { width: 4px; }
    .site-list::-webkit-scrollbar-track { background: transparent; }
    .site-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .site-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 8px 12px; transition: 0.2s;
    }
    .site-item:hover { background: rgba(255,255,255,0.08); }
    .site-name {
      font-size: 13px; color: rgba(255,255,255,0.85);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .remove-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: 18px; line-height: 1;
      padding: 0 0 0 8px; transition: 0.2s;
    }
    .remove-btn:hover { color: #f87171; }

    .empty {
      text-align: center; padding: 20px;
      color: rgba(255,255,255,0.3); font-size: 13px;
    }

    /* ── Quick add ── */
    .quick-add {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .quick-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 20px; padding: 3px 10px;
      font-size: 12px; color: #a5b4fc;
      cursor: pointer; transition: 0.2s; user-select: none;
    }
    .chip:hover { background: rgba(99,102,241,0.3); }
    .chip.added {
      background: rgba(16,185,129,0.15);
      border-color: rgba(16,185,129,0.3);
      color: #6ee7b7;
    }

    /* ── Status bar ── */
    .status-bar {
      background: rgba(16,185,129,0.1);
      border-top: 1px solid rgba(16,185,129,0.2);
      padding: 7px 16px;
      font-size: 11px; color: #6ee7b7;
      display: flex; align-items: center; gap: 6px;
    }
    .status-bar.disabled {
      background: rgba(239,68,68,0.1);
      border-top-color: rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7b7; }
    .dot.disabled { background: #fca5a5; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">OptiMind Blocker</span>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">BẬT</span>
      <label class="toggle">
        <input type="checkbox" id="enable-toggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="content">
    <div class="input-row">
      <input
        type="text"
        id="site-input"
        class="input-field"
        placeholder="Nhập domain (vd: facebook.com)"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="add-btn" id="add-btn">+ Thêm</button>
    </div>

    <div class="section-label">Đang chặn (<span id="count">0</span> trang)</div>
    <div class="site-list" id="site-list">
      <div class="empty">Chưa có trang nào bị chặn</div>
    </div>

    <div class="quick-add">
      <div class="quick-label">Thêm nhanh:</div>
      <div class="quick-chips" id="quick-chips">
        <span class="chip" data-site="facebook.com">Facebook</span>
        <span class="chip" data-site="youtube.com">YouTube</span>
        <span class="chip" data-site="tiktok.com">TikTok</span>
        <span class="chip" data-site="instagram.com">Instagram</span>
        <span class="chip" data-site="twitter.com">Twitter/X</span>
        <span class="chip" data-site="reddit.com">Reddit</span>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Đang bảo vệ phiên học của bạn</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
